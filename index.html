<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Hex Takeover</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
  <label>玩家數量: <span id="playerCountValue">2</span></label>
  <input type="range" id="playerCountRange" min="2" max="6" value="2">

  <label>棋盤大小: <span id="sizeValue">3</span></label>
  <input type="range" id="sizeRange" min="2" max="8" value="3">

  <label>障礙物: <span id="obsValue">2</span></label>
  <input type="range" id="obsRange" min="0" max="15" value="2">

  <button id="initBtn">初始化棋盤</button>
  <button id="undoBtn">悔棋</button>

  <div id="status"></div>
  <div id="legend"></div>
</div>

<div id="main">
  <canvas id="c" width="800" height="600"></canvas>

  <div id="chatBox"></div>
  <div id="chatInput">
    <input id="name" placeholder="名字" />
    <input id="msg" placeholder="輸入訊息..." />
    <button id="sendBtn">送出</button>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
